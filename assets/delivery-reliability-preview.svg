<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Delivery Reliability - visão executiva</title>
  <desc id="desc">Prévia do case de análise logística em Power BI com indicadores de entregas, cumprimento de prazo, atraso, lead time, tendência mensal, desempenho por equipe e distribuição por status.</desc>
  <defs>
    <style>
      .title { font: 700 38px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #d7e0e6; }
      .tag { font: 700 14px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .label { font: 700 14px Arial, Helvetica, sans-serif; fill: #687784; }
      .value { font: 700 38px Arial, Helvetica, sans-serif; fill: #24323d; }
      .section { font: 700 18px Arial, Helvetica, sans-serif; fill: #24323d; }
      .small { font: 400 13px Arial, Helvetica, sans-serif; fill: #687784; }
      .axis { font: 400 12px Arial, Helvetica, sans-serif; fill: #687784; }
      .barlabel { font: 400 12px Arial, Helvetica, sans-serif; fill: #24323d; }
      .insight { font: 400 15px Arial, Helvetica, sans-serif; fill: #24323d; }
    </style>
  </defs>

  <rect width="1400" height="820" rx="22" fill="#f5f7fa"/>
  <rect width="1400" height="110" rx="22" fill="#0b2233"/>
  <rect y="88" width="1400" height="22" fill="#0b2233"/>
  <text x="58" y="52" class="title">Delivery Reliability</text>
  <text x="58" y="82" class="subtitle">Análise de desempenho logístico e priorização operacional</text>
  <rect x="1122" y="32" width="220" height="42" rx="18" fill="#18384d" stroke="#35566b"/>
  <text x="1150" y="58" class="tag">CASE 02 | POWER BI</text>

  <!-- KPI cards -->
  <g>
    <rect x="48" y="136" width="308" height="118" rx="16" fill="#ffffff" stroke="#dce3e8"/>
    <rect x="48" y="136" width="8" height="118" rx="4" fill="#3e6b89"/>
    <text x="76" y="170" class="label">TOTAL DE ENTREGAS</text>
    <text x="76" y="220" class="value">53,77 mil</text>
  </g>
  <g>
    <rect x="380" y="136" width="308" height="118" rx="16" fill="#ffffff" stroke="#dce3e8"/>
    <rect x="380" y="136" width="8" height="118" rx="4" fill="#3e6b89"/>
    <text x="408" y="170" class="label">TAXA DE CUMPRIMENTO</text>
    <text x="408" y="220" class="value">87,02%</text>
  </g>
  <g>
    <rect x="712" y="136" width="308" height="118" rx="16" fill="#ffffff" stroke="#dce3e8"/>
    <rect x="712" y="136" width="8" height="118" rx="4" fill="#c9853f"/>
    <text x="740" y="170" class="label">TAXA DE ATRASO</text>
    <text x="740" y="220" class="value">12,98%</text>
  </g>
  <g>
    <rect x="1044" y="136" width="308" height="118" rx="16" fill="#ffffff" stroke="#dce3e8"/>
    <rect x="1044" y="136" width="8" height="118" rx="4" fill="#0b2233"/>
    <text x="1072" y="170" class="label">LEAD TIME MÉDIO</text>
    <text x="1072" y="220" class="value">2,84 dias</text>
  </g>

  <!-- Line chart -->
  <rect x="48" y="280" width="820" height="314" rx="16" fill="#ffffff" stroke="#dce3e8"/>
  <text x="72" y="316" class="section">Evolução mensal da taxa de atraso</text>
  <text x="72" y="340" class="small">Análise pela data efetiva da entrega</text>
  <line x1="88" y1="548" x2="838" y2="548" stroke="#dce3e8" stroke-width="2"/>
  <line x1="88" y1="398" x2="88" y2="548" stroke="#dce3e8" stroke-width="2"/>
  <line x1="88" y1="498" x2="838" y2="498" stroke="#edf1f4"/>
  <line x1="88" y1="448" x2="838" y2="448" stroke="#edf1f4"/>
  <line x1="88" y1="398" x2="838" y2="398" stroke="#edf1f4"/>
  <polyline points="92,510 132,493 172,470 212,519 252,476 292,495 332,512 372,482 412,487 452,427 492,393 532,514 572,481 612,454 652,460 692,492 732,466 772,510 828,528" fill="none" stroke="#3e6b89" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <text x="72" y="570" class="axis">jan/19</text>
  <text x="264" y="570" class="axis">jul/19</text>
  <text x="455" y="570" class="axis">jan/20</text>
  <text x="734" y="570" class="axis">ago/20</text>

  <!-- Team ranking -->
  <rect x="892" y="280" width="460" height="314" rx="16" fill="#ffffff" stroke="#dce3e8"/>
  <text x="916" y="316" class="section">Taxa de atraso por equipe</text>
  <text x="916" y="340" class="small">Categorias com baixo volume exigem cautela</text>
  <text x="916" y="382" class="barlabel">Internet</text>
  <rect x="1000" y="366" width="285" height="18" rx="9" fill="#edf1f4"/>
  <rect x="1000" y="366" width="220" height="18" rx="9" fill="#3e6b89"/>
  <text x="1230" y="381" class="axis">27,54%</text>
  <text x="916" y="424" class="barlabel">Venda Direta</text>
  <rect x="1000" y="408" width="285" height="18" rx="9" fill="#edf1f4"/>
  <rect x="1000" y="408" width="165" height="18" rx="9" fill="#3e6b89"/>
  <text x="1175" y="423" class="axis">20,69%</text>
  <text x="916" y="466" class="barlabel">Sul</text>
  <rect x="1000" y="450" width="285" height="18" rx="9" fill="#edf1f4"/>
  <rect x="1000" y="450" width="144" height="18" rx="9" fill="#3e6b89"/>
  <text x="1154" y="465" class="axis">18,03%</text>
  <text x="916" y="508" class="barlabel">Televendas</text>
  <rect x="1000" y="492" width="285" height="18" rx="9" fill="#edf1f4"/>
  <rect x="1000" y="492" width="139" height="18" rx="9" fill="#3e6b89"/>
  <text x="1149" y="507" class="axis">17,44%</text>
  <text x="916" y="550" class="barlabel">Norte</text>
  <rect x="1000" y="534" width="285" height="18" rx="9" fill="#edf1f4"/>
  <rect x="1000" y="534" width="100" height="18" rx="9" fill="#3e6b89"/>
  <text x="1110" y="549" class="axis">12,50%</text>

  <!-- Status distribution -->
  <rect x="48" y="620" width="640" height="158" rx="16" fill="#ffffff" stroke="#dce3e8"/>
  <text x="72" y="654" class="section">Distribuição das entregas por status</text>
  <rect x="96" y="687" width="118" height="55" rx="8" fill="#3e6b89"/>
  <rect x="282" y="714" width="118" height="28" rx="8" fill="#8fa7b7"/>
  <rect x="468" y="721" width="118" height="21" rx="8" fill="#c9853f"/>
  <text x="126" y="680" class="small">38 mil</text>
  <text x="320" y="707" class="small">9 mil</text>
  <text x="506" y="714" class="small">7 mil</text>
  <text x="116" y="766" class="axis">Antecipado</text>
  <text x="309" y="766" class="axis">No prazo</text>
  <text x="500" y="766" class="axis">Atrasado</text>

  <!-- Executive insight -->
  <rect x="712" y="620" width="640" height="158" rx="16" fill="#eaf0f4" stroke="#c7d6e0"/>
  <text x="738" y="654" class="section">Leitura executiva</text>
  <text x="738" y="686" class="insight">87,02% das entregas foram concluídas no prazo ou antecipadamente.</text>
  <text x="738" y="712" class="insight">A taxa geral de atraso foi de 12,98%, com atraso médio de 2,07 dias.</text>
  <text x="738" y="738" class="insight">A priorização deve combinar taxa de atraso e volume, evitando decisões</text>
  <text x="738" y="762" class="insight">baseadas apenas em percentuais de categorias com poucos registros.</text>
</svg>