<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">SQL Maintenance Analytics</title>
  <desc id="desc">Prévia executiva de um projeto de SQL aplicado à análise de manutenção de uma indústria têxtil fictícia.</desc>
  <defs>
    <style>
      .t1{font:700 42px Arial,Helvetica,sans-serif;fill:#fff}.t2{font:400 20px Arial,Helvetica,sans-serif;fill:#d7e0e6}.tag{font:700 14px Arial,Helvetica,sans-serif;fill:#fff}.label{font:700 14px Arial,Helvetica,sans-serif;fill:#687784}.value{font:700 34px Arial,Helvetica,sans-serif;fill:#24323d}.section{font:700 19px Arial,Helvetica,sans-serif;fill:#24323d}.body{font:400 15px Arial,Helvetica,sans-serif;fill:#24323d}.flow{font:700 14px Arial,Helvetica,sans-serif;fill:#0b2233}
    </style>
  </defs>
  <rect width="1400" height="760" rx="22" fill="#f5f7fa"/>
  <rect width="1400" height="118" rx="22" fill="#0b2233"/>
  <rect y="96" width="1400" height="22" fill="#0b2233"/>
  <text x="58" y="56" class="t1">SQL Maintenance Analytics</text>
  <text x="58" y="88" class="t2">Falhas, custos, preventivas e produção em uma indústria têxtil fictícia</text>
  <rect x="1130" y="34" width="212" height="42" rx="18" fill="#18384d" stroke="#35566b"/>
  <text x="1168" y="60" class="tag">CASE 03 | SQL</text>

  <g>
    <rect x="48" y="144" width="306" height="112" rx="16" fill="#fff" stroke="#dce3e8"/>
    <rect x="48" y="144" width="8" height="112" rx="4" fill="#3e6b89"/>
    <text x="76" y="177" class="label">REGISTROS ANALISADOS</text><text x="76" y="224" class="value">48.144</text>
  </g>
  <g>
    <rect x="374" y="144" width="306" height="112" rx="16" fill="#fff" stroke="#dce3e8"/>
    <rect x="374" y="144" width="8" height="112" rx="4" fill="#3e6b89"/>
    <text x="402" y="177" class="label">MÁQUINAS</text><text x="402" y="224" class="value">60</text>
  </g>
  <g>
    <rect x="700" y="144" width="306" height="112" rx="16" fill="#fff" stroke="#dce3e8"/>
    <rect x="700" y="144" width="8" height="112" rx="4" fill="#c9853f"/>
    <text x="728" y="177" class="label">EVENTOS DE FALHA</text><text x="728" y="224" class="value">720</text>
  </g>
  <g>
    <rect x="1026" y="144" width="326" height="112" rx="16" fill="#fff" stroke="#dce3e8"/>
    <rect x="1026" y="144" width="8" height="112" rx="4" fill="#0b2233"/>
    <text x="1054" y="177" class="label">ORDENS DE MANUTENÇÃO</text><text x="1054" y="224" class="value">1.500</text>
  </g>

  <rect x="48" y="286" width="820" height="220" rx="16" fill="#fff" stroke="#dce3e8"/>
  <text x="74" y="324" class="section">Pergunta de negócio</text>
  <text x="74" y="360" class="body">Como os dados de máquinas, falhas, ordens e produção podem apoiar</text>
  <text x="74" y="386" class="body">a priorização das ações de manutenção?</text>
  <rect x="74" y="430" width="150" height="38" rx="19" fill="#eaf0f4"/><text x="107" y="454" class="flow">MÁQUINAS</text>
  <rect x="242" y="430" width="130" height="38" rx="19" fill="#eaf0f4"/><text x="276" y="454" class="flow">FALHAS</text>
  <rect x="390" y="430" width="150" height="38" rx="19" fill="#eaf0f4"/><text x="426" y="454" class="flow">CUSTOS</text>
  <rect x="558" y="430" width="170" height="38" rx="19" fill="#eaf0f4"/><text x="590" y="454" class="flow">PREVENTIVAS</text>
  <rect x="746" y="430" width="90" height="38" rx="19" fill="#eaf0f4"/><text x="764" y="454" class="flow">PRODUÇÃO</text>

  <rect x="892" y="286" width="460" height="220" rx="16" fill="#fff" stroke="#dce3e8"/>
  <text x="918" y="324" class="section">Demonstração técnica</text>
  <text x="918" y="360" class="body">• Banco relacional em PostgreSQL</text>
  <text x="918" y="390" class="body">• Importação e validação de arquivos CSV</text>
  <text x="918" y="420" class="body">• JOINs e agregações</text>
  <text x="918" y="450" class="body">• Análise de falhas e custos</text>
  <text x="918" y="480" class="body">• Resultados orientados ao negócio</text>

  <rect x="48" y="536" width="1304" height="170" rx="16" fill="#eaf0f4" stroke="#c7d6e0"/>
  <text x="74" y="574" class="section">Narrativa do case</text>
  <text x="74" y="612" class="body">Arquivos operacionais → banco relacional → validação → consultas SQL → análise de falhas, custos e produção.</text>
</svg>