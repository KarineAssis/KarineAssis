<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Modelo de dados do Case 02</title>
  <desc id="desc">Diagrama dimensional com duas tabelas fato, dimensões e tabela de medidas.</desc>
  <defs>
    <style>
      .bg{fill:#f5f7fa}.panel{fill:#ffffff;stroke:#d7e0e6;stroke-width:2}.fact{fill:#0b2233}.dim{fill:#3e6b89}.meas{fill:#c9853f}.h1{font:700 34px Arial,Helvetica,sans-serif;fill:#0b2233}.sub{font:400 16px Arial,Helvetica,sans-serif;fill:#687784}.th{font:700 18px Arial,Helvetica,sans-serif;fill:#ffffff}.body{font:400 15px Arial,Helvetica,sans-serif;fill:#24323d}.small{font:400 13px Arial,Helvetica,sans-serif;fill:#687784}.rel{stroke:#7f8d98;stroke-width:3;fill:none}.rel2{stroke:#7f8d98;stroke-width:3;stroke-dasharray:8 7;fill:none}.card{font:700 15px Arial,Helvetica,sans-serif;fill:#24323d}.legend{font:400 14px Arial,Helvetica,sans-serif;fill:#24323d}
    </style>
  </defs>
  <rect class="bg" width="1400" height="820" rx="24"/>
  <text x="52" y="58" class="h1">Modelo de dados</text>
  <text x="52" y="88" class="sub">Estrutura dimensional utilizada para conectar desempenho logístico e experiência do cliente</text>

  <!-- Relationships behind tables -->
  <path class="rel" d="M430 305 H520"/>
  <path class="rel" d="M430 500 H520"/>
  <path class="rel" d="M880 305 H970"/>
  <path class="rel" d="M880 500 H970"/>
  <path class="rel" d="M285 210 V250 H520"/>
  <path class="rel" d="M285 590 V630 H520"/>
  <path class="rel" d="M1115 210 V250 H880"/>
  <path class="rel2" d="M1115 590 V630 H880"/>

  <!-- Left dimensions -->
  <g>
    <rect x="65" y="135" width="365" height="150" rx="14" class="panel"/>
    <rect x="65" y="135" width="365" height="44" rx="14" class="dim"/>
    <rect x="65" y="165" width="365" height="14" class="dim"/>
    <text x="87" y="164" class="th">Dim_Equipe_Atendimento</text>
    <text x="87" y="207" class="body">Equipe_Atendimento</text>
    <text x="392" y="258" class="card">1</text>
  </g>

  <g>
    <rect x="65" y="330" width="365" height="150" rx="14" class="panel"/>
    <rect x="65" y="330" width="365" height="44" rx="14" class="dim"/>
    <rect x="65" y="360" width="365" height="14" class="dim"/>
    <text x="87" y="359" class="th">Dim_Motivos</text>
    <text x="87" y="402" class="body">Motivo_Contato</text>
    <text x="87" y="428" class="body">Severidade</text>
    <text x="392" y="455" class="card">1</text>
  </g>

  <g>
    <rect x="65" y="525" width="365" height="150" rx="14" class="panel"/>
    <rect x="65" y="525" width="365" height="44" rx="14" class="dim"/>
    <rect x="65" y="555" width="365" height="14" class="dim"/>
    <text x="87" y="554" class="th">Dim_LOB</text>
    <text x="87" y="597" class="body">LOB</text>
    <text x="392" y="650" class="card">1</text>
  </g>

  <!-- Facts -->
  <g>
    <rect x="520" y="180" width="360" height="270" rx="16" class="panel"/>
    <rect x="520" y="180" width="360" height="50" rx="16" class="fact"/>
    <rect x="520" y="214" width="360" height="16" class="fact"/>
    <text x="546" y="213" class="th">Fato_Interacoes</text>
    <text x="546" y="260" class="body">Data_Contato</text>
    <text x="546" y="288" class="body">Canal_Atendimento</text>
    <text x="546" y="316" class="body">Motivo_Contato</text>
    <text x="546" y="344" class="body">Equipe_Atendimento</text>
    <text x="546" y="372" class="body">ID_Agente</text>
    <text x="546" y="400" class="body">CSAT_Flag</text>
    <text x="536" y="307" class="card">*</text>
  </g>

  <g>
    <rect x="520" y="475" width="360" height="270" rx="16" class="panel"/>
    <rect x="520" y="475" width="360" height="50" rx="16" class="fact"/>
    <rect x="520" y="509" width="360" height="16" class="fact"/>
    <text x="546" y="508" class="th">Fato_Entregas</text>
    <text x="546" y="555" class="body">Data_Pedido</text>
    <text x="546" y="583" class="body">Data_Entrega_Prevista</text>
    <text x="546" y="611" class="body">Data_Entrega_Realizada</text>
    <text x="546" y="639" class="body">Status_Validado</text>
    <text x="546" y="667" class="body">Desvio_Prazo_Dias</text>
    <text x="546" y="695" class="body">Lead_Time_Dias</text>
    <text x="536" y="502" class="card">*</text>
  </g>

  <!-- Right dimensions -->
  <g>
    <rect x="970" y="135" width="365" height="150" rx="14" class="panel"/>
    <rect x="970" y="135" width="365" height="44" rx="14" class="dim"/>
    <rect x="970" y="165" width="365" height="14" class="dim"/>
    <text x="992" y="164" class="th">Dim_Canal_Atendimento</text>
    <text x="992" y="207" class="body">Canal_Atendimento</text>
    <text x="986" y="258" class="card">1</text>
  </g>

  <g>
    <rect x="970" y="330" width="365" height="150" rx="14" class="panel"/>
    <rect x="970" y="330" width="365" height="44" rx="14" class="dim"/>
    <rect x="970" y="360" width="365" height="14" class="dim"/>
    <text x="992" y="359" class="th">Dim_Agentes</text>
    <text x="992" y="402" class="body">ID_Agente</text>
    <text x="992" y="428" class="body">Equipe_Atendimento</text>
    <text x="986" y="455" class="card">1</text>
  </g>

  <g>
    <rect x="970" y="525" width="365" height="150" rx="14" class="panel"/>
    <rect x="970" y="525" width="365" height="44" rx="14" class="dim"/>
    <rect x="970" y="555" width="365" height="14" class="dim"/>
    <text x="992" y="554" class="th">Dim_Calendario</text>
    <text x="992" y="597" class="body">Data</text>
    <text x="992" y="623" class="body">Ano_Mes</text>
    <text x="992" y="649" class="body">Ano</text>
    <text x="986" y="650" class="card">1</text>
  </g>

  <!-- Measure table -->
  <g>
    <rect x="1040" y="700" width="295" height="82" rx="14" class="panel"/>
    <rect x="1040" y="700" width="295" height="38" rx="14" class="meas"/>
    <rect x="1040" y="725" width="295" height="13" class="meas"/>
    <text x="1062" y="727" class="th">Medidas</text>
    <text x="1062" y="760" class="small">KPIs e cálculos DAX centralizados</text>
  </g>

  <!-- Legend -->
  <circle cx="75" cy="762" r="8" fill="#0b2233"/><text x="92" y="768" class="legend">Tabela fato</text>
  <circle cx="205" cy="762" r="8" fill="#3e6b89"/><text x="222" y="768" class="legend">Dimensão</text>
  <line x1="350" y1="762" x2="400" y2="762" class="rel"/><text x="414" y="768" class="legend">Relacionamento ativo</text>
  <line x1="585" y1="762" x2="635" y2="762" class="rel2"/><text x="649" y="768" class="legend">Relacionamento inativo</text>
</svg>