<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Karine de Assis — Business Analytics, Operational Excellence and Digital Transformation</title>
  <desc id="desc">Professional profile banner in navy and copper, with a subtle analytical and operational visual language.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071522"/>
      <stop offset="0.62" stop-color="#0b2233"/>
      <stop offset="1" stop-color="#102d42"/>
