    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b66f2d"/>
      <stop offset="1" stop-color="#e2a35f"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1400" height="420" rx="26" fill="url(#bg)"/>
  <circle cx="1190" cy="80" r="150" fill="#1c4a67" opacity="0.20" filter="url(#soft)"/>
