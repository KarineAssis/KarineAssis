<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Customer Experience Performance Analytics</title>
  <desc id="desc">Prévia executiva de um projeto de análise de experiência do cliente com dados sintéticos, indicadores de CSAT, DSAT, FCR, AHT e recontato.</desc>
  <defs>
    <style>
      .t1{font:700 42px Arial,Helvetica,sans-serif;fill:#fff}.t2{font:400 20px Arial,Helvetica,sans-serif;fill:#d7e0e6}.tag{font:700 14px Arial,Helvetica,sans-serif;fill:#fff}.label{font:700 14px Arial,Helvetica,sans-serif;fill:#687784}.value{font:700 34px Arial,Helvetica,sans-serif;fill:#24323d}.section{font:700 19px Arial,Helvetica,sans-serif;fill:#24323d}.small{font:400 14px Arial,Helvetica,sans-serif;fill:#687784}.body{font:400 15px Arial,Helvetica,sans-serif;fill:#24323d}.flow{font:700 14px Arial,Helvetica,sans-serif;fill:#0b2233}
    </style>
  </defs>
  <rect width="1400" height="760" rx="22" fill="#f5f7fa"/>
  <rect width="1400" height="118" rx="22" fill="#0b2233"/>
  <rect y="96" width="1400" height="22" fill="#0b2233"/>
  <text x="58" y="56" class="t1">Customer Experience Performance Analytics</text>
  <text x="58" y="88" class="t2">Dados operacionais e de atendimento transformados em diagnóstico, priorização e decisão</text>
  <rect x="1130" y="34" width="212" height="42" rx="18" fill="#18384d" stroke="#35566b"/>
  <text x="1162" y="60" class="tag">CASE 02 | POWER BI</text>

  <g>
    <rect x="48" y="144" width="248" height="112" rx="16" fill="#fff" stroke="#dce3e8"/>
    <rect x="48" y="144" width="8" height="112" rx="4" fill="#3e6b89"/>
    <text x="76" y="177" class="label">INTERAÇÕES</text><text x="76" y="224" class="value">16.318</text>
  </g>
  <g>
    <rect x="316" y="144" width="248" height="112" rx="16" fill="#fff" stroke="#dce3e8"/>
    <rect x="316" y="144" width="8" height="112" rx="4" fill="#3e6b89"/>
    <text x="344" y="177" class="label">CSAT</text><text x="344" y="224" class="value">64,02%</text>
  </g>
  <g>
    <rect x="584" y="144" width="248" height="112" rx="16" fill="#fff" stroke="#dce3e8"/>
    <rect x="584" y="144" width="8" height="112" rx="4" fill="#c9853f"/>
    <text x="612" y="177" class="label">DSAT</text><text x="612" y="224" class="value">9,90%</text>
  </g>
  <g>
    <rect x="852" y="144" width="248" height="112" rx="16" fill="#fff" stroke="#dce3e8"/>
    <rect x="852" y="144" width="8" height="112" rx="4" fill="#3e6b89"/>
    <text x="880" y="177" class="label">FCR</text><text x="880" y="224" class="value">57,76%</text>
  </g>
  <g>
    <rect x="1120" y="144" width="232" height="112" rx="16" fill="#fff" stroke="#dce3e8"/>
    <rect x="1120" y="144" width="8" height="112" rx="4" fill="#0b2233"/>
    <text x="1148" y="177" class="label">AHT MÉDIO</text><text x="1148" y="224" class="value">12,09 min</text>
  </g>

  <rect x="48" y="286" width="820" height="220" rx="16" fill="#fff" stroke="#dce3e8"/>
  <text x="74" y="324" class="section">Pergunta de negócio</text>
  <text x="74" y="360" class="body">Como combinar dados operacionais e dados de atendimento para identificar os</text>
  <text x="74" y="386" class="body">principais drivers da insatisfação e melhorar simultaneamente experiência,</text>
  <text x="74" y="412" class="body">eficiência e resolução?</text>
  <rect x="74" y="442" width="142" height="38" rx="19" fill="#eaf0f4"/><text x="101" y="466" class="flow">CSAT / DSAT</text>
  <rect x="234" y="442" width="112" height="38" rx="19" fill="#eaf0f4"/><text x="266" y="466" class="flow">FCR</text>
  <rect x="364" y="442" width="116" height="38" rx="19" fill="#eaf0f4"/><text x="397" y="466" class="flow">AHT</text>
  <rect x="498" y="442" width="144" height="38" rx="19" fill="#eaf0f4"/><text x="527" y="466" class="flow">RECONTATO</text>
  <rect x="660" y="442" width="164" height="38" rx="19" fill="#eaf0f4"/><text x="690" y="466" class="flow">QUARTIS</text>

  <rect x="892" y="286" width="460" height="220" rx="16" fill="#fff" stroke="#dce3e8"/>
  <text x="918" y="324" class="section">Estrutura analítica</text>
  <text x="918" y="360" class="body">• Base sintética e documentada</text>
  <text x="918" y="388" class="body">• Power Query e modelo dimensional</text>
  <text x="918" y="416" class="body">• Medidas DAX e ranking por quartil</text>
  <text x="918" y="444" class="body">• Power BI, SQL e Python</text>
  <text x="918" y="472" class="body">• Insights e recomendações executivas</text>

  <rect x="48" y="536" width="1304" height="170" rx="16" fill="#eaf0f4" stroke="#c7d6e0"/>
  <text x="74" y="574" class="section">Narrativa do case</text>
  <text x="74" y="612" class="body">Problema de negócio → dados sintéticos → tratamento e validação → modelo de dados → métricas → drivers de experiência</text>
  <text x="74" y="642" class="body">→ segmentação de performance → cinco insights principais → recomendações de negócio.</text>
  <text x="74" y="678" class="small">Projeto em desenvolvimento • dados totalmente fictícios • sem uso de informações confidenciais</text>
</svg>