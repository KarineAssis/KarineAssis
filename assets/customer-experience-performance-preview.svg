<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Logistics Customer Experience Analytics</title>
  <desc id="desc">Prévia executiva de um projeto de Power BI que relaciona desempenho de entregas e satisfação do cliente.</desc>
  <defs>
    <style>
      .t1{font:700 42px Arial,Helvetica,sans-serif;fill:#fff}.t2{font:400 20px Arial,Helvetica,sans-serif;fill:#d7e0e6}.tag{font:700 14px Arial,Helvetica,sans-serif;fill:#fff}.label{font:700 14px Arial,Helvetica,sans-serif;fill:#687784}.value{font:700 34px Arial,Helvetica,sans-serif;fill:#24323d}.section{font:700 19px Arial,Helvetica,sans-serif;fill:#24323d}.small{font:400 14px Arial,Helvetica,sans-serif;fill:#687784}.body{font:400 15px Arial,Helvetica,sans-serif;fill:#24323d}.flow{font:700 14px Arial,Helvetica,sans-serif;fill:#0b2233}
    </style>
  </defs>
  <rect width="1400" height="760" rx="22" fill="#f5f7fa"/>
  <rect width="1400" height="118" rx="22" fill="#0b2233"/>
  <rect y="96" width="1400" height="22" fill="#0b2233"/>
  <text x="58" y="56" class="t1">Logistics Customer Experience Analytics</text>
  <text x="58" y="88" class="t2">Desempenho de entregas e satisfação do cliente em uma visão única</text>
  <rect x="1130" y="34" width="212" height="42" rx="18" fill="#18384d" stroke="#35566b"/>
  <text x="1162" y="60" class="tag">CASE 02 | POWER BI</text>

  <g>
    <rect x="48" y="144" width="306" height="112" rx="16" fill="#fff" stroke="#dce3e8"/>
    <rect x="48" y="144" width="8" height="112" rx="4" fill="#3e6b89"/>
    <text x="76" y="177" class="label">ENTREGAS ANALISADAS</text><text x="76" y="224" class="value">53.770</text>
  </g>
  <g>
    <rect x="374" y="144" width="306" height="112" rx="16" fill="#fff" stroke="#dce3e8"/>
    <rect x="374" y="144" width="8" height="112" rx="4" fill="#3e6b89"/>
    <text x="402" y="177" class="label">CUMPRIMENTO DO PRAZO</text><text x="402" y="224" class="value">87,02%</text>
  </g>
  <g>
    <rect x="700" y="144" width="306" height="112" rx="16" fill="#fff" stroke="#dce3e8"/>
    <rect x="700" y="144" width="8" height="112" rx="4" fill="#c9853f"/>
    <text x="728" y="177" class="label">TAXA DE ATRASO</text><text x="728" y="224" class="value">12,98%</text>
  </g>
  <g>
    <rect x="1026" y="144" width="326" height="112" rx="16" fill="#fff" stroke="#dce3e8"/>
    <rect x="1026" y="144" width="8" height="112" rx="4" fill="#0b2233"/>
    <text x="1054" y="177" class="label">SATISFAÇÃO DO CLIENTE</text><text x="1054" y="224" class="value">64,02%</text>
  </g>

  <rect x="48" y="286" width="820" height="220" rx="16" fill="#fff" stroke="#dce3e8"/>
  <text x="74" y="324" class="section">Pergunta de negócio</text>
  <text x="74" y="360" class="body">Onde estão concentrados os atrasos e como o desempenho das entregas</text>
  <text x="74" y="386" class="body">afeta a experiência do cliente?</text>
  <rect x="74" y="430" width="160" height="38" rx="19" fill="#eaf0f4"/><text x="102" y="454" class="flow">ENTREGAS</text>
  <rect x="252" y="430" width="154" height="38" rx="19" fill="#eaf0f4"/><text x="286" y="454" class="flow">ATRASOS</text>
  <rect x="424" y="430" width="180" height="38" rx="19" fill="#eaf0f4"/><text x="452" y="454" class="flow">SATISFAÇÃO</text>
  <rect x="622" y="430" width="202" height="38" rx="19" fill="#eaf0f4"/><text x="650" y="454" class="flow">MOTIVOS DE CONTATO</text>

  <rect x="892" y="286" width="460" height="220" rx="16" fill="#fff" stroke="#dce3e8"/>
  <text x="918" y="324" class="section">Demonstração técnica</text>
  <text x="918" y="360" class="body">• Tratamento e validação no Power Query</text>
  <text x="918" y="390" class="body">• Modelo dimensional</text>
  <text x="918" y="420" class="body">• Medidas DAX</text>
  <text x="918" y="450" class="body">• Dashboard executivo em Power BI</text>
  <text x="918" y="480" class="body">• Três insights e recomendações</text>

  <rect x="48" y="536" width="1304" height="170" rx="16" fill="#eaf0f4" stroke="#c7d6e0"/>
  <text x="74" y="574" class="section">Narrativa do case</text>
  <text x="74" y="612" class="body">Problema logístico → dados sintéticos → tratamento → modelagem → dashboard → três insights → recomendações.</text>
  <text x="74" y="652" class="small">Projeto em desenvolvimento • dados totalmente fictícios • sem uso de informações confidenciais</text>
</svg>